# Render Blueprint — разворачивает watcher как бесплатный web-сервис.
# Free web-сервис засыпает после 15 мин простоя, поэтому держим его живым
# внешним пингером (UptimeRobot / cron-job.org) — см. README.
services:
  - type: web
    name: amazon-deal-watcher
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python watcher.py"
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: RUN_MODE
        value: loop
      - key: CHECK_INTERVAL_MINUTES
        value: "20"
      # Секреты задайте в дашборде Render (Environment), НЕ здесь:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
