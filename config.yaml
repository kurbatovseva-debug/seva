# =============================================================================
# Amazon Deal Watcher — конфигурация правил (бесплатная версия, парсинг Amazon)
# =============================================================================
# query   — поисковый запрос для Amazon (как будто вводите в строку поиска)
# label   — раздел в уведомлении (Обувь / Одежда)
# brand   — бренд (для подписи)
# sizes   — искомые размеры (ищутся в названии товара, best-effort)
# min_discount — минимальный % скидки (считается от зачёркнутой цены)
# domain  — US / DE / UK
# =============================================================================

check_interval_minutes: 20

watches:
  # --------------------------- ОБУВЬ (10 US, ≥60%) --------------------------
  - label: "👞 Обувь"
    brand: "HUGO"
    query: "HUGO men shoes size 10"
    sizes: ["10"]
    min_discount: 60
    domain: "US"

  - label: "👞 Обувь"
    brand: "GANT"
    query: "GANT men shoes size 10"
    sizes: ["10"]
    min_discount: 60
    domain: "US"

  # --------------------------- ОДЕЖДА (M/L, ≥70%) ---------------------------
  - label: "👕 Одежда"
    brand: "GANT"
    query: "GANT men shirt"
    sizes: ["M", "L", "Medium", "Large"]
    min_discount: 70
    domain: "US"

  - label: "👕 Одежда"
    brand: "Lacoste"
    query: "Lacoste men polo"
    sizes: ["M", "L", "Medium", "Large"]
    min_discount: 1          # ВРЕМЕННО снижено для теста уведомления (вернуть на 70)
    domain: "US"

  - label: "👕 Одежда"
    brand: "Hugo Boss"
    query: "Hugo Boss men shirt"
    sizes: ["M", "L", "Medium", "Large"]
    min_discount: 70
    domain: "US"
