# =============================================================================
# Amazon Deal Watcher — конфигурация правил отслеживания
# =============================================================================
# Меняйте бренды, размеры и пороги скидки прямо здесь. После правок
# перезапустите сервис (на Render — "Manual Deploy" или он подхватит push).
# =============================================================================

# Как часто проверять (минуты). Можно переопределить переменной CHECK_INTERVAL_MINUTES.
check_interval_minutes: 15

# Список правил. Каждое правило = один бренд + свои условия.
# label   — раздел в уведомлении (Обувь / Одежда)
# brand   — точное имя бренда как в Amazon/Keepa
# sizes   — искомые размеры (best-effort: ищутся в названии и вариациях)
# min_discount — минимальный % скидки, чтобы считать предложение интересным
# domain  — маркетплейс: US, DE, UK и т.д.
# root_category — (опц.) ограничить категорией Amazon (числовой id), ускоряет поиск

watches:
  # --------------------------- ОБУВЬ (10 US, ≥60%) --------------------------
  - label: "👞 Обувь"
    brand: "HUGO"
    sizes: ["10", "10 US", "US 10"]
    min_discount: 60
    domain: "US"
    max_products: 50

  - label: "👞 Обувь"
    brand: "GANT"
    sizes: ["10", "10 US", "US 10"]
    min_discount: 60
    domain: "US"
    max_products: 50

  # --------------------------- ОДЕЖДА (M/L, ≥70%) ---------------------------
  - label: "👕 Одежда"
    brand: "GANT"
    sizes: ["M", "L", "Medium", "Large"]
    min_discount: 70
    domain: "US"
    max_products: 50

  - label: "👕 Одежда"
    brand: "Lacoste"
    sizes: ["M", "L", "Medium", "Large"]
    min_discount: 70
    domain: "US"
    max_products: 50

  - label: "👕 Одежда"
    brand: "Hugo Boss"
    sizes: ["M", "L", "Medium", "Large"]
    min_discount: 70
    domain: "US"
    max_products: 50
